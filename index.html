  <style>
    /* 骨架屏动画 */
    @keyframes shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: calc(200px + 100%) 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(240,240,240,0.8) 25%,
        rgba(224,224,224,0.9) 37%,
        rgba(240,240,240,0.8) 63%
      );
      background-size: 400px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-item {
      height: 16px;
      border-radius: 4px;
      margin-bottom: 8px;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-circle {
      border-radius: 50% !important;
    }
    [data-theme="dark"] .skeleton {
      background: linear-gradient(
        90deg,
        rgba(42,42,42,0.9) 25%,
        rgba(31,31,31,0.95) 37%,
        rgba(42,42,42,0.9) 63%
      );
      background-size: 400px 100%;
    }
    [data-theme="dark"] .skeleton-item {
      background: linear-gradient(
        90deg,
        rgba(42,42,42,0.9) 25%,
        rgba(31,31,31,0.95) 37%,
        rgba(42,42,42,0.9) 63%
      );
      background-size: 400px 100%;
    }

    /* 真实内容初始隐藏，避免闪烁 */
    #appWrapper { opacity: 0; transition: opacity 0.3s ease; }
    #appWrapper.loaded { opacity: 1; }

    /* 骨架屏样式 */
    #skeletonScreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      background: #fff;
      overflow: hidden;
    }
    [data-theme="dark"] #skeletonScreen {
      background: #1a1a2e;
    }
    #skeletonScreen .layui-admin-wrapper {
      height: 100%;
      display: flex;
    }
    #skeletonScreen .layui-sidebar {
      width: 220px;
      height: 100%;
      padding: 16px 0;
      flex-shrink: 0;
    }
    #skeletonScreen .layui-sidebar-logo {
      display: flex;
      align-items: center;
      padding: 0 16px 16px;
      border-bottom: 1px solid rgba(128,128,128,0.1);
      margin-bottom: 16px;
    }
    [data-theme="dark"] #skeletonScreen .layui-sidebar-logo {
      border-bottom-color: rgba(255,255,255,0.1);
    }
    #skeletonScreen .layui-logo-icon {
      width: 32px;
      height: 32px;
    }
    #skeletonScreen .layui-logo-text {
      margin-left: 12px;
      font-size: 16px;
      font-weight: 500;
    }
    #skeletonScreen .layui-sidebar-menu {
      padding: 0 12px;
    }
    #skeletonScreen .menu-section {
      font-size: 12px;
      color: rgba(128,128,128,0.7);
      padding: 8px 8px 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #skeletonScreen .menu-item {
      height: 44px;
      border-radius: 8px;
      margin: 4px 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }
    #skeletonScreen .menu-icon {
      width: 20px;
      height: 20px;
      margin-right: 12px;
    }
    #skeletonScreen .menu-text {
      flex: 1;
      height: 16px;
      border-radius: 4px;
    }
    #skeletonScreen .menu-item.submenu {
      height: 36px;
      margin-left: 20px;
    }
    #skeletonScreen .layui-main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #skeletonScreen .layui-topbar {
      height: 60px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(128,128,128,0.1);
      background: #fff;

    [data-theme="dark"] #skeletonScreen .layui-topbar {
      background: #1a1a2e;
      border-bottom-color: rgba(255,255,255,0.1);
    }
    #skeletonScreen .layui-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #skeletonScreen .layui-tabs-container {
      height: 48px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(128,128,128,0.1);

      gap: 12px;

    #skeletonScreen .tab-item {

      padding: 0 16px;

      display: flex;
      align-items: center;

    #skeletonScreen .layui-content-wrapper {

      padding: 24px;

    #skeletonScreen .layui-card {
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;

    .skeleton-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;

                <label>主色调</label>
                <div id="pickerAccent" class="color-picker-wrap"></div>
              </div>
              <div class="custom-color-field">
                <label>侧边栏背景</label>
                <div id="pickerSidebarBg" class="color-picker-wrap"></div>
              </div>
              <div class="custom-color-field">
                <label>侧边栏文字</label>
                <div id="pickerSidebarText" class="color-picker-wrap"></div>
              </div>
              <div class="custom-color-field">
                <label>内容区背景</label>
                <div id="pickerContentBg" class="color-picker-wrap"></div>
              </div>
              <div class="custom-color-field">
                <label>顶部栏背景</label>
                <div id="pickerTopbarBg" class="color-picker-wrap"></div>
              </div>
              <div class="custom-color-field">
                <label>标签栏背景</label>
                <div id="pickerTabsBg" class="color-picker-wrap"></div>
              </div>
            </div>
          </div>
        </div>

      <div class="config-section">
        <div class="config-section-title">框体布局</div>
        <div class="layout-options">
          <div class="layout-option active" data-layout="double">
            <div class="layout-option-icon">
              <div class="layout-icon-submenu"></div>
              <div class="layout-content">
                <div class="layout-tabs"></div>
                <div class="layout-body"></div>
              </div>
            </div>
            <div class="layout-option-label">双列菜单</div>
          </div>
          <div class="layout-option" data-layout="fixed-double">
            <div class="layout-option-icon">
              <div class="layout-icon-fixed-sidebar"></div>
              <div class="layout-icon-fixed-submenu"></div>
              <div class="layout-content">
                <div class="layout-tabs"></div>
                <div class="layout-body"></div>
              </div>
            </div>
            <div class="layout-option-label">固定双列</div>
          </div>
          <div class="layout-option" data-layout="dropdown">
            <div class="layout-option-icon">
              <div class="layout-content">
                <div class="layout-tabs"></div>
                <div class="layout-body"></div>
              </div>
            </div>
            <div class="layout-option-label">下拉菜单</div>
          </div>
        </div>
      </div>

      <div class="config-section">
        <div class="config-section-title">功能开关</div>
        <div class="config-item">
          <div class="config-item-label-wrapper">
            <span class="config-item-label">标签页栏</span>
            <span class="config-item-desc">显示/隐藏多标签页导航</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="tabsToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="config-item">
          <div class="config-item-label-wrapper">
            <span class="config-item-label">标签页记忆</span>
            <span class="config-item-desc">刷新页面后恢复已打开标签页</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="rememberTabsToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="config-item">
          <div class="config-item-label-wrapper">
            <span class="config-item-label">菜单手风琴</span>
            <span class="config-item-desc">展开一个菜单时自动收起其他</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="accordionToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="config-item">
          <div class="config-item-label-wrapper">
            <span class="config-item-label">水印</span>
            <span class="config-item-desc">在内容区域显示用户水印</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="watermarkToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="config-section">
        <div class="config-section-title">页面动画</div>
        <div class="config-item">
          <div class="config-item-label-wrapper">
            <span class="config-item-label">切换效果</span>
            <span class="config-item-desc">页面切换时的动画效果</span>
          </div>
          <div class="layui-form">
            <select class="theme-config-select" id="pageAnimationSelect" lay-filter="pageAnimation">
              <option value="fadeIn">渐显</option>
              <option value="slideDown">顶部往下</option>
              <option value="slideLeft">从右往左</option>
              <option value="slideRight">从左往右</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="layui-theme-panel-footer">
      <button class="layui-theme-btn layui-theme-btn-secondary" id="resetThemeBtn">
        <i class="layui-icon layui-icon-refresh"></i>重置
      </button>
      <button class="layui-theme-btn layui-theme-btn-primary" id="saveThemeBtn">
        <i class="layui-icon layui-icon-ok"></i>保存
      </button>
    </div>
  </div>
  
  <!-- LayUI：必须先于 index.js 加载（保证 layui 全局变量可用） -->
  <script src="lib/layui/layui.js"></script>

  <!-- init.js：页面初始化（sidebar状态 + 骨架屏工具 + Service Worker） -->
  <script src="admin/js/init.js"></script>

  <!-- index.js：主入口，依赖 layui 全局变量 -->
  <script src="admin/js/index.js"></script>
</body>
</html>
