<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配色方案预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px 20px;
      background: #1a1a1a;
      color: #fff;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-weight: 600;
    }
    
    .schemes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .scheme {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 24px;
    }
    
    .scheme-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #444;
    }
    
    .theme-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .theme {
      flex: 1;
    }
    
    .theme-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .preview {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .preview-sidebar {
      width: 60px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .preview-main {
      flex: 1;
      padding: 16px;
    }
    
    .preview-header {
      height: 40px;
      margin-bottom: 16px;
      border-radius: 8px;
    }
    
    .preview-content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .preview-card {
      padding: 16px;
      border-radius: 8px;
    }
    
    .preview-text {
      height: 12px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    
    .preview-text.short { width: 60%; }
    .preview-text.medium { width: 80%; }
    .preview-text.long { width: 100%; }
    
    .preview-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 8px;
    }
    
    .preview-menu-item {
      height: 32px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    
    .preview-menu-item.active {
      background: var(--accent-light);
    }
    
    .color-vars {
      margin-top: 16px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      color: #aaa;
      line-height: 1.8;
    }
    
    /* GitHub 亮色 */
    .github-light {
      --bg: #f6f8fa;
      --bg-content: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #24292f;
      --text-secondary: #57606a;
      --text-muted: #8c959f;
      --border: #d0d7de;
      --bg-sidebar: #0d1117;
      --bg-sidebar-hover: #161b22;
      --accent: #1f6feb;
      --accent-light: rgba(31, 111, 235, 0.1);
    }
    
    .github-light .preview { background: var(--bg); }
    .github-light .preview-sidebar { background: var(--bg-sidebar); }
    .github-light .preview-main { background: var(--bg-content); }
    .github-light .preview-header { background: var(--card-bg); border: 1px solid var(--border); }
    .github-light .preview-card { background: var(--card-bg); border: 1px solid var(--border); }
    .github-light .preview-text { background: var(--text-muted); }
    .github-light .preview-text.primary { background: var(--text-primary); }
    .github-light .preview-btn { background: var(--accent); color: #fff; }
    .github-light .preview-menu-item { background: transparent; }
    .github-light .preview-menu-item:hover { background: var(--bg-sidebar-hover); }
    .github-light .preview-menu-item.active { background: var(--accent-light); }
    
    /* GitHub 深色 */

      --card-bg: #21262d;
