<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>穿梭框组件 - Layui</title>
  <meta name="keywords" content="穿梭框,transfer,数据迁移">
  <meta name="description" content="Layui穿梭框组件使用示例">
</head>
<body>
  <div class="page-content">
    <div class="layui-card">
      <div class="layui-card-header">
        <h3>穿梭框组件 (transfer)</h3>
      </div>
      <div class="layui-card-body">
        
        <fieldset class="layui-elem-field layui-field-title">
          <legend>基础用法</legend>
          <div class="layui-field-box">
            <div id="test1"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>定义标题</legend>
          <div class="layui-field-box">
            <div id="test2"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>初始右侧数据集合</legend>
          <div class="layui-field-box">
            <div id="test3"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>显示搜索框</legend>
          <div class="layui-field-box">
            <div id="test4"></div>
          </div>
        </fieldset>

      </div>
    </div>
  </div>

  <script>
  layui.use(['transfer'], function(){
    var transfer = layui.transfer;
    
    var data1 = [
      {"value": "1", "title": "李白"}
      ,{"value": "2", "title": "杜甫"}
      ,{"value": "3", "title": "苏轼"}
      ,{"value": "4", "title": "李清照"}
      ,{"value": "5", "title": "鲁迅", "disabled": true}
      ,{"value": "6", "title": "巴金"}
      ,{"value": "7", "title": "冰心"}
      ,{"value": "8", "title": "矛盾"}
      ,{"value": "9", "title": "贤心"}
    ];
    
    transfer.render({
      elem: '#test1'
      ,data: data1
    });
    
    transfer.render({
      elem: '#test2'
      ,data: data1
      ,title: ['文学大师', '喜欢的作家']
    });
    
    transfer.render({
      elem: '#test3'
      ,data: data1
      ,value: ["1", "3", "5"]
    });
    
    transfer.render({
      elem: '#test4'
      ,data: data1
      ,showSearch: true
    });
  });
  </script>
</body>
</html>
