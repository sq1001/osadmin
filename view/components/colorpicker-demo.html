<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颜色选择器组件 - Layui</title>
  <meta name="keywords" content="颜色选择器,colorpicker,颜色">
  <meta name="description" content="Layui颜色选择器组件使用示例">
</head>
<body>
  <div class="page-content">
    <div class="layui-card">
      <div class="layui-card-header">
        <h3>颜色选择器组件 (colorpicker)</h3>
      </div>
      <div class="layui-card-body">
        
        <fieldset class="layui-elem-field layui-field-title">
          <legend>常规使用</legend>
          <div class="layui-field-box">
            <div id="test1"></div>
            <div id="test2" style="margin-left: 30px;"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>表单赋值</legend>
          <div class="layui-field-box">
            <form class="layui-form" action="">
              <div class="layui-form-item">
                <label class="layui-form-label">颜色选择</label>
                <div class="layui-input-inline">
                  <input type="text" value="" placeholder="请选择颜色" class="layui-input" id="test-input">
                </div>
                <div class="layui-input-inline" style="width: 36px;">
                  <div id="test-form"></div>
                </div>
              </div>
            </form>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>预定义颜色项</legend>
          <div class="layui-field-box">
            <div id="test3"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>开启透明度</legend>
          <div class="layui-field-box">
            <div id="test4"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>颜色格式</legend>
          <div class="layui-field-box">
            <div class="layui-form-item">
              <div class="layui-inline">
                <label class="layui-form-label">HEX格式</label>
                <div class="layui-input-inline" style="width: 100px;">
                  <input type="text" class="layui-input" id="format-hex" readonly>
                </div>
                <div class="layui-input-inline" style="width: 36px;">
                  <div id="test-hex"></div>
                </div>
              </div>
              <div class="layui-inline">
                <label class="layui-form-label">RGB格式</label>
                <div class="layui-input-inline" style="width: 150px;">
                  <input type="text" class="layui-input" id="format-rgb" readonly>
                </div>
                <div class="layui-input-inline" style="width: 36px;">
                  <div id="test-rgb"></div>
                </div>
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>颜色选择回调</legend>
          <div class="layui-field-box">
            <div id="test5"></div>
            <div id="color-result" style="margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 4px;">
              当前颜色：<span id="currentColor">#1c97f5</span>
            </div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>预设颜色列表</legend>
          <div class="layui-field-box">
            <div id="test6"></div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>尺寸</legend>
          <div class="layui-field-box">
            <div style="display: flex; align-items: center; gap: 20px;">
              <div>
                <span style="margin-right: 5px;">默认：</span>
                <div id="test-size-default"></div>
              </div>
              <div>
                <span style="margin-right: 5px;">小尺寸：</span>
                <div id="test-size-sm"></div>
              </div>
              <div>
                <span style="margin-right: 5px;">大尺寸：</span>
                <div id="test-size-lg"></div>
              </div>
            </div>
          </div>
        </fieldset>

      </div>
    </div>
  </div>

  <script>
  layui.use(['colorpicker', 'form'], function(){
    var colorpicker = layui.colorpicker;
    var form = layui.form;
    
    colorpicker.render({
      elem: '#test1',
      color: '#1c97f5',
      done: function(color){
        console.log('选择的颜色：'+ color);
      }
    });
    
    colorpicker.render({
      elem: '#test2',
      color: 'rgba(218, 121, 157, 0.5)',
      alpha: true,
      format: 'rgb'
    });
    
    colorpicker.render({
      elem: '#test-form',
      color: '#1c97f5',
      done: function(color){
        $('#test-input').val(color);
      }
    });
    
    colorpicker.render({
      elem: '#test3',
      color: '#1c97f5',
      predefine: true
    });
    
    colorpicker.render({
      elem: '#test4',
      alpha: true
    });

    colorpicker.render({
      elem: '#test-hex',
      color: '#FF5722',
      format: 'hex',
      done: function(color){
        $('#format-hex').val(color);
      }
    });

    colorpicker.render({
      elem: '#test-rgb',
      color: 'rgb(255, 87, 34)',
      format: 'rgb',
      done: function(color){
        $('#format-rgb').val(color);
      }
    });

    colorpicker.render({
      elem: '#test5',
      color: '#1c97f5',
      done: function(color){
        $('#currentColor').text(color);
        $('#color-result').css('background', color);
      }
    });

    colorpicker.render({
      elem: '#test6',
      color: '#16baaa',
      predefine: true,
      colors: ['#FF5722', '#FFB800', '#16baaa', '#1E9FFF', '#16b777', '#5FB878', '#009688', '#393D49']
    });

    colorpicker.render({
      elem: '#test-size-default',
      color: '#1E9FFF'
    });

    colorpicker.render({
      elem: '#test-size-sm',
      color: '#16baaa',
      size: 'sm'
    });

    colorpicker.render({
      elem: '#test-size-lg',
      color: '#FF5722',
      size: 'lg'
    });
  });
  </script>
</body>
</html>
