<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>树形表格组件 - Layui</title>
  <meta name="keywords" content="树形表格,treeTable,树表">
  <meta name="description" content="Layui树形表格组件使用示例">
</head>
<body>
  <div class="page-content">
    <div class="layui-card">
      <div class="layui-card-header">
        <h3>树形表格组件 (treeTable)</h3>
      </div>
      <div class="layui-card-body">
        
        <fieldset class="layui-elem-field layui-field-title">
          <legend>基础用法</legend>
          <div class="layui-field-box">
            <table id="demo" lay-filter="test"></table>
          </div>
        </fieldset>

      </div>
    </div>
  </div>

  <script type="text/html" id="toolbarDemo">
    <div class="layui-btn-container">
      <button class="layui-btn layui-btn-sm" lay-event="getChecked">获取选中数据</button>
      <button class="layui-btn layui-btn-sm" lay-event="reload">重载表格</button>
      <button class="layui-btn layui-btn-sm" lay-event="expandAll">展开全部</button>
      <button class="layui-btn layui-btn-sm" lay-event="collapseAll">折叠全部</button>
    </div>
  </script>

  <script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
  </script>

  <script>
  layui.use(['treeTable'], function(){
    var treeTable = layui.treeTable;
    var $ = layui.$;
    
    var data = [
      {
        id: 1,
        name: '研发部',
        manager: '张三',
        memberCount: 20,
        createTime: '2024-01-01',
        children: [
          {
            id: 11,
            name: '前端组',
            manager: '李四',
            memberCount: 8,
            createTime: '2024-01-15'
          },
          {
            id: 12,
            name: '后端组',
            manager: '王五',
            memberCount: 12,
            createTime: '2024-01-15'
          }
        ]
      },
      {
        id: 2,
        name: '市场部',
        manager: '赵六',
        memberCount: 15,
        createTime: '2024-02-01',
        children: [
          {
            id: 21,
            name: '销售组',
            manager: '孙七',
            memberCount: 10,
            createTime: '2024-02-15'
          },
          {
            id: 22,
            name: '推广组',
            manager: '周八',
            memberCount: 5,
            createTime: '2024-02-15'
          }
        ]
      },
      {
        id: 3,
        name: '人事部',
        manager: '吴九',
        memberCount: 8,
        createTime: '2024-03-01'
      }
    ];
    
    var insTb = treeTable.render({
      elem: '#demo',
      data: data,
      tree: {
        customName: {
          id: 'id',
          pid: 'parentId',
          children: 'children'
        },
        view: {
          expandAll: true
        }
      },
      toolbar: '#toolbarDemo',
      defaultToolbar: ['filter', 'exports', 'print'],
      cols: [[
        {type: 'checkbox', fixed: 'left'},
        {field: 'id', title: 'ID', width: 80, sort: true},
        {field: 'name', title: '部门名称', width: 200},
        {field: 'manager', title: '负责人', width: 120},
        {field: 'memberCount', title: '人数', width: 100, sort: true},
        {field: 'createTime', title: '创建时间', width: 180},
        {fixed: 'right', title: '操作', toolbar: '#barDemo', width: 150}
      ]],
      page: false
    });
    
    treeTable.on('toolbar(test)', function(obj){
      var checkStatus = treeTable.checkStatus(obj.config.id);
      
      switch(obj.event){
        case 'getChecked':
          var data = checkStatus.data;
          layer.alert(JSON.stringify(data));
          break;
        case 'reload':
          insTb.reload();
          break;
        case 'expandAll':
          insTb.expandAll(true);
          break;
        case 'collapseAll':
          insTb.expandAll(false);
          break;
      }
    });
    
    treeTable.on('tool(test)', function(obj){
      var data = obj.data;
      
      if(obj.event === 'del'){
        layer.confirm('真的删除行么', function(index){
          obj.del();
          layer.close(index);
        });
      } else if(obj.event === 'edit'){
        layer.prompt({
          formType: 2
          ,value: data.name
        }, function(value, index){
          obj.update({
            name: value
          });
          layer.close(index);
        });
      }
    });
  });
  </script>
</body>
</html>
