    <form class="layui-form main-form" lay-filter="mainForm">
      <div class="main-box">
        <div class="form-section">
          <div class="form-section-header">
            <span class="form-section-title">基本信息（竖版）</span>
          </div>
          <div class="form-section-body">
            <div class="form-row">
              <div class="layui-form-item column">
                <label class="layui-form-label required">名称</label>
                <div class="layui-input-block">
                  <input type="text" name="name" placeholder="请输入名称" required lay-verify="required" class="layui-input">
                </div>
                <i class="layui-icon layui-icon-tips layui-input-prefix-icon" lay-on="tip_name"></i>
              </div>

              <div class="layui-form-item column">
                <label class="layui-form-label required">编码</label>
                <div class="layui-input-block">
                  <input type="text" name="code" placeholder="请输入编码" required lay-verify="required" class="layui-input">
                </div>
                <i class="layui-icon layui-icon-tips layui-input-prefix-icon" lay-on="tip_code"></i>
              </div>
            </div>

            <div class="form-row">
              <div class="layui-form-item column">
                <label class="layui-form-label">生效日期</label>
                <div class="layui-input-block">
                  <div class="date-range">
                    <input type="text" name="effect_date[]" id="effect_date-start" class="layui-input" placeholder="开始日期">
                    <span class="date-separator">至</span>
                    <input type="text" name="effect_date[]" id="effect_date-end" class="layui-input" placeholder="结束日期">
                  </div>
                </div>
              </div>

              <div class="layui-form-item column">
                <label class="layui-form-label required">启用状态</label>
                <div class="layui-input-block">
                  <input type="checkbox" name="status" value="1" lay-skin="switch" lay-text="开启|关闭" checked>
                </div>
              </div>
            </div>

            <div class="layui-form-item column">
              <label class="layui-form-label">测试测试测试测试测试测试测试测试测试Logo</label>
              <div class="layui-input-block">
                  <img class="img-3" src=""/>
                  <input type="text" style="display:none" name="logo" value="/admin/images/avatar.webp" />
                  <button type="button" class="layui-btn layui-btn-sm" id="image">
                      <i class="layui-icon layui-icon-upload"></i>上传图片
                  </button>
                  <button type="button" class="layui-btn layui-btn-sm" id="attachment-choose-image">
                      <i class="layui-icon layui-icon-align-left"></i>选择图片
                  </button>
                  <div class="form-tip">支持 jpg、png、pdf 格式，单个文件不超过 5MB</div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-header">
            <span class="form-section-title">基本信息</span>
          </div>
          <div class="form-section-body">
            <div class="form-row">
              <div class="layui-form-item">
                <label class="layui-form-label required">名称</label>
                <div class="layui-input-block">
                  <input type="text" name="name" placeholder="请输入名称" required lay-verify="required" class="layui-input">
                </div>
                <i class="layui-icon layui-icon-tips layui-input-prefix-icon" lay-on="tip_name"></i>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label required">编码</label>
                <div class="layui-input-block">
                  <input type="text" name="code" placeholder="请输入编码" required lay-verify="required" class="layui-input">
                </div>
                <i class="layui-icon layui-icon-tips layui-input-prefix-icon" lay-on="tip_code"></i>
              </div>
            </div>

            <div class="form-row">
              <div class="layui-form-item">
                <label class="layui-form-label">所属分类</label>
                <div class="layui-input-block">
                  <select name="category" lay-verify="">
                    <option value="">请选择分类</option>
                    <option value="1">分类一</option>
                    <option value="2">分类二</option>
                    <option value="3">分类三</option>
                  </select>
                </div>
                <i class="layui-icon layui-icon-tips layui-input-prefix-icon" lay-on="tip_category"></i>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">所属部门</label>
                <div class="layui-input-block">
                  <div id="deptSelect"></div>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="layui-form-item">
                <label class="layui-form-label required">开通成本</label>
                <div class="layui-input-block">
                  <input type="text" lay-affix="number" name="cost" min="0" max="100" step="1" lay-verify="required|number" placeholder="请输入开通成本" class="layui-input">
                  <div class="form-tip">范围 0-100</div>
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label required">端口</label>
                <div class="layui-input-block">
                  <input type="text" lay-affix="number" name="port" value="465" min="0" step="1" lay-verify="required|number" autocomplete="off" placeholder="" class="layui-input">
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="layui-form-item">
                <label class="layui-form-label">生效日期</label>
                <div class="layui-input-block">
                  <div class="date-range">
                    <input type="text" name="effect_date[]" id="effect_date-start" class="layui-input" placeholder="开始日期">
                    <span class="date-separator">至</span>
                    <input type="text" name="effect_date[]" id="effect_date-end" class="layui-input" placeholder="结束日期">
                  </div>
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label required">启用状态</label>
                <div class="layui-input-block">
                  <input type="checkbox" name="status" value="1" lay-skin="switch" lay-text="开启|关闭" checked>
                </div>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">测试测试测试测试测试测试测试测试测试Logo</label>
              <div class="layui-input-block">
                  <img class="img-3" src=""/>
                  <input type="text" style="display:none" name="logo" value="/admin/images/avatar.webp" />
                  <button type="button" class="layui-btn layui-btn-sm" id="image">
                      <i class="layui-icon layui-icon-upload"></i>上传图片
                  </button>
                  <button type="button" class="layui-btn layui-btn-sm" id="attachment-choose-image">
                      <i class="layui-icon layui-icon-align-left"></i>选择图片
                  </button>
                  <div class="form-tip">支持 jpg、png、pdf 格式，单个文件不超过 5MB</div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-header">
            <span class="form-section-title">扩展信息</span>
          </div>
          <div class="form-section-body">
            <div class="form-row">
              <div class="layui-form-item">
                <label class="layui-form-label">用户标签</label>
                <div class="layui-input-block">
                  <div id="tagSelect"></div>
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">权限角色</label>
                <div class="layui-input-block">
                  <div id="roleSelect"></div>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="layui-form-item">
                <label class="layui-form-label">优先级</label>
                <div class="layui-input-block">
                  <input type="radio" name="priority" value="1" title="低">
                  <input type="radio" name="priority" value="2" title="中" checked>
                  <input type="radio" name="priority" value="3" title="高">
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">通知方式</label>
                <div class="layui-input-block">
                  <input type="checkbox" name="notify" value="email" title="邮件" checked>
                  <input type="checkbox" name="notify" value="sms" title="短信">
                  <input type="checkbox" name="notify" value="wechat" title="微信">
                </div>
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">处理器</label>
              <div class="layui-input-block">
                <input type="text" name="handler" value="" lay-verify="" class="layui-input" placeholder="请输入处理器名称">
              </div>
            </div>

            <div class="layui-form-item">
              <label class="layui-form-label">备注说明</label>
              <div class="layui-input-block">
                <textarea name="remark" placeholder="请输入备注说明" class="layui-textarea"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-header">
            <span class="form-section-title">其他设置</span>
          </div>
          <div class="form-section-body">
            <div class="layui-tabs">
              <ul class="layui-tabs-header">
                <li lay-id="aaa">设置1</li>
                <li lay-id="bbb">设置2</li>
                <li lay-id="ccc">设置3</li>
              </ul>
              <div class="layui-tabs-body">
                <div class="layui-tabs-item">
                  <div class="form-row-3">
                    <div class="layui-form-item">
                      <label class="layui-form-label">排序号</label>
                      <div class="layui-input-block">
                        <input type="text" lay-affix="number" name="sort" value="0" min="0" lay-verify="number" class="layui-input">
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">最大数量</label>
                      <div class="layui-input-block">
                        <input type="text" lay-affix="number" name="max_count" value="100" min="1" class="layui-input">
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">超时时间</label>
                      <div class="layui-input-block">
                        <input type="text" lay-affix="number" name="timeout" value="30" min="1" class="layui-input">
                        <div class="form-tip">单位：秒</div>
                      </div>
                    </div>
                  </div>
                  <div class="layui-form-item">
                    <label class="layui-form-label">附件上传</label>
                    <div class="layui-input-block">
                      <button type="button" class="layui-btn layui-btn-sm" id="uploadBtn">
                        <i class="layui-icon layui-icon-upload"></i>上传文件
                      </button>
                      <div class="form-tip">支持 jpg、png、pdf 格式，单个文件不超过 5MB</div>
                    </div>
                  </div>
                </div>
                <div class="layui-tabs-item">
                  <div class="form-row">
                    <div class="layui-form-item">
                      <label class="layui-form-label">数量</label>
                      <div class="layui-input-block">
                        <input type="text" lay-affix="number" name="max_count" value="100" min="1" class="layui-input">
                      </div>
                    </div>

                    <div class="layui-form-item">
                      <label class="layui-form-label">时间</label>
                      <div class="layui-input-block">
                        <input type="text" lay-affix="number" name="timeout" value="30" min="1" class="layui-input">
                        <div class="form-tip">单位：秒</div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="layui-tabs-item">设置3</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="main-form-footer-box">
        <div class="button-group">
          <button type="submit" class="layui-btn layui-btn-sm" lay-submit lay-filter="save">
            <i class="layui-icon layui-icon-ok"></i>提交
          </button>
          <button type="reset" class="layui-btn layui-btn-sm layui-btn-primary">
            <i class="layui-icon layui-icon-refresh"></i>重置
          </button>
        </div>
      </div>
    </form>
  <!-- </div> -->
  <script src="/lib/layui/layui.js"></script>
  <script src="/admin/js/index.js"></script>
  <script src="/admin/js/extends/searchForm.js"></script>
  <script>
    // 图片上传
    layui.use(['upload', 'layer', 'toastMod'], function() {
        let $ = layui.$;
        let form = layui.form;
        let toast = layui.toastMod;

        // image
        let input = $("#image").prev();
        input.prev().attr("src", input.val());
        layui.$("#attachment-choose-image").on("click", function() {
            parent.layer.open({
                type: 2,
                title: "选择附件",
                content: "/app/admin/upload/attachment?ext=jpg,jpeg,png,gif,bmp",
                area: ["95%", "90%"],
                success: function (layero, index) {
                    parent.layui.$("#layui-layer" + index).data("callback", function (data) {
                        input.val(data.url).prev().attr("src", data.url);
                    });
                }
            });
        });
        layui.upload.render({
            elem: "#image",
            url: "/app/admin/upload/uploadImage?type=logo",
            acceptMime: "image/gif,image/jpeg,image/jpg,image/png",
            done: function (res) {
                if (res.code) {
                    return toast.failure(res.msg);
                }
                this.item.prev().val(res.data.url).prev().attr("src", res.data.url);
            }
        });
    });

    layui.use(['form', 'util', 'layer', 'laydate', 'upload', 'xmSelectMod'], function() {
      var form = layui.form;
      var util = layui.util;
      var layer = layui.layer;
      var laydate = layui.laydate;
      var upload = layui.upload;
      var xmSelect = layui.xmSelectMod;
      var $ = layui.$;

      laydate.render({
        elem: '#last_login_at-start',
        type: 'datetime'
      });

      laydate.render({
        elem: '#last_login_at-end',
        type: 'datetime'
      });

      laydate.render({
        elem: '#effect_date-start'
      });

      laydate.render({
        elem: '#effect_date-end'
      });

      xmSelect.render({
        el: '#deptSelect',
        name: 'dept_id',
        tips: '请选择部门',
        data: [
          {name: '技术部', value: 1},
          {name: '市场部', value: 2},
          {name: '运营部', value: 3},
          {name: '财务部', value: 4}
        ]
      });

      xmSelect.render({
        el: '#tagSelect',
        name: 'tags',
        tips: '请选择标签',
        multiple: true,
        data: [
          {name: 'VIP用户', value: 1},
          {name: '活跃用户', value: 2},
          {name: '新用户', value: 3},
          {name: '老用户', value: 4}
        ]
      });

      xmSelect.render({
        el: '#roleSelect',
        name: 'roles',
        tips: '请选择角色',
        multiple: true,
        data: [
          {name: '管理员', value: 1},
          {name: '编辑', value: 2},
          {name: '访客', value: 3}
        ]
      });

      upload.render({
        elem: '#uploadBtn',
        url: '/api/upload',
        accept: 'file',
        exts: 'jpg|png|pdf',
        size: 5120,
        done: function(res) {
          if (res.code === 0) {
            layer.msg('上传成功', {icon: 1});
          }
        }
      });

      // 提示图标功能
      var tipData = {
        tip_name: '请输入名称，该名称将用于系统显示和标识。',
        tip_code: '请输入唯一编码，只能包含字母、数字和下划线。',
        tip_category: '选择所属分类，用于数据分组和筛选。',
        tip_cost: '开通成本范围 0-100，单位：元。',
        tip_port: '服务端口号，范围 1-65535，常用端口：80、443、8080等。'
      };

      // 事件
      util.on('lay-on', {
        'tip_name': function(){
          layer.tips(tipData.tip_name, this, {
            tips: [4, '#16b777']
          });
        },
        'tip_code': function(){
          layer.tips(tipData.tip_code, this, {
            tips: [4, '#16b777'],
            time: 3000,
            maxWidth: 280
          });
        },
        'tip_category': function(){
          layer.tips(tipData.tip_category, this, {
            tips: [4, '#16b777'],
            time: 3000,
            maxWidth: 280
          });
        },
        'tip_cost': function(){
          layer.tips(tipData.tip_cost, this, {
            tips: [4, '#16b777'],
            time: 3000,
            maxWidth: 280
          });
        },
        'tip_port': function(){
          layer.tips(tipData.tip_port, this, {
            tips: [4, '#16b777'],
            time: 3000,
            maxWidth: 280
          });
        },
      }, {
        trigger: 'mouseenter' // 鼠标移入时触发事件
      })

      form.on('submit(table-query)', function(data) {
        console.log('查询条件：', data.field);
        return false;
      });

      form.on('submit(save)', function(data) {
        layer.msg('提交成功', { icon: 1 });
        console.log('表单数据：', data.field);
        return false;
      });

      form.render();
    });
  </script>
</body>
</html>
