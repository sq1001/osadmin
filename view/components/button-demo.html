<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>按钮组件</title>
</head>
<body>
<div class="page-content">
  <div class="demo-header">
    <h3 class="demo-title">按钮组件</h3>
    <p class="demo-desc">Layui 按钮元素的完整示例，包含不同主题、尺寸、图标等</p>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">主题按钮</span>
    </div>
    <div class="layui-card-body">
      <div class="btn-group">
        <button type="button" class="layui-btn layui-btn-primary">原始按钮</button>
        <button type="button" class="layui-btn">默认按钮</button>
        <button type="button" class="layui-btn layui-btn-normal">百搭按钮</button>
        <button type="button" class="layui-btn layui-btn-warm">暖色按钮</button>
        <button type="button" class="layui-btn layui-btn-danger">警告按钮</button>
        <button type="button" class="layui-btn layui-btn-disabled">禁用按钮</button>
      </div>
    </div>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">尺寸按钮</span>
    </div>
    <div class="layui-card-body">
      <div class="btn-group">
        <button type="button" class="layui-btn layui-btn-lg">大型按钮</button>
        <button type="button" class="layui-btn">默认按钮</button>
        <button type="button" class="layui-btn layui-btn-sm">小型按钮</button>
        <button type="button" class="layui-btn layui-btn-xs">迷你按钮</button>
      </div>
      <div class="btn-group" style="margin-top: 16px;">
        <button type="button" class="layui-btn layui-btn-lg layui-btn-normal">大型百搭</button>
        <button type="button" class="layui-btn layui-btn-warm">暖色按钮</button>
        <button type="button" class="layui-btn layui-btn-sm layui-btn-danger">小型警告</button>
        <button type="button" class="layui-btn layui-btn-xs layui-btn-disabled">禁用</button>
      </div>
    </div>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">圆角按钮</span>
    </div>
    <div class="layui-card-body">
      <div class="btn-group">
        <button type="button" class="layui-btn layui-btn-primary layui-btn-radius">原始按钮</button>
        <button type="button" class="layui-btn layui-btn-radius">默认按钮</button>
        <button type="button" class="layui-btn layui-btn-normal layui-btn-radius">百搭按钮</button>
        <button type="button" class="layui-btn layui-btn-warm layui-btn-radius">暖色按钮</button>
        <button type="button" class="layui-btn layui-btn-danger layui-btn-radius">警告按钮</button>
      </div>
    </div>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">图标按钮</span>
    </div>
    <div class="layui-card-body">
      <div class="btn-group">
        <button type="button" class="layui-btn"><i class="layui-icon layui-icon-addition"></i> 添加</button>
        <button type="button" class="layui-btn layui-btn-normal"><i class="layui-icon layui-icon-edit"></i> 编辑</button>
        <button type="button" class="layui-btn layui-btn-warm"><i class="layui-icon layui-icon-upload"></i> 上传</button>
        <button type="button" class="layui-btn layui-btn-danger"><i class="layui-icon layui-icon-delete"></i> 删除</button>
        <button type="button" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-refresh"></i> 刷新</button>
        <button type="button" class="layui-btn layui-btn-normal"><i class="layui-icon layui-icon-download-circle"></i> 下载</button>
      </div>
      <div class="btn-group" style="margin-top: 16px;">
        <button type="button" class="layui-btn layui-btn-primary layui-btn-sm"><i class="layui-icon layui-icon-search"></i></button>
        <button type="button" class="layui-btn layui-btn-sm"><i class="layui-icon layui-icon-addition"></i></button>
        <button type="button" class="layui-btn layui-btn-normal layui-btn-sm"><i class="layui-icon layui-icon-edit"></i></button>
        <button type="button" class="layui-btn layui-btn-warm layui-btn-sm"><i class="layui-icon layui-icon-upload"></i></button>
        <button type="button" class="layui-btn layui-btn-danger layui-btn-sm"><i class="layui-icon layui-icon-delete"></i></button>
        <button type="button" class="layui-btn layui-btn-disabled layui-btn-sm"><i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i></button>
      </div>
    </div>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">按钮组</span>
    </div>
    <div class="layui-card-body">
      <div class="layui-btn-group">
        <button type="button" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-left"></i></button>
        <button type="button" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-right"></i></button>
        <button type="button" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-up"></i></button>
        <button type="button" class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-down"></i></button>
      </div>
      <div class="layui-btn-group" style="margin-left: 16px;">
        <button type="button" class="layui-btn"><i class="layui-icon layui-icon-addition"></i> 增加</button>
        <button type="button" class="layui-btn"><i class="layui-icon layui-icon-edit"></i> 编辑</button>
        <button type="button" class="layui-btn"><i class="layui-icon layui-icon-delete"></i> 删除</button>
      </div>
    </div>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">流体按钮</span>
    </div>
    <div class="layui-card-body">
      <button type="button" class="layui-btn layui-btn-fluid">流体按钮（宽度自适应）</button>
      <button type="button" class="layui-btn layui-btn-fluid layui-btn-normal" style="margin-top: 10px;">流体百搭按钮</button>
    </div>
  </div>

  <div class="layui-card">
    <div class="layui-card-header">
      <span class="layui-card-title">自定义主题按钮</span>
    </div>
    <div class="layui-card-body">
      <div class="btn-group">
        <button type="button" class="layui-btn btn-accent">主题色按钮</button>
        <button type="button" class="layui-btn btn-accent-outline">主题色边框</button>
        <button type="button" class="layui-btn btn-gradient">渐变按钮</button>
        <button type="button" class="layui-btn btn-shadow">阴影按钮</button>
      </div>
    </div>
  </div>
</div>

<style>
.demo-header {
  margin-bottom: 16px;
}
.demo-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.demo-desc {
  font-size: 13px;
  color: var(--text-muted);
}
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  border-color: var(--accent);
}
.btn-accent:hover {
  opacity: 0.9;
}
.btn-accent-outline {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}
.btn-accent-outline:hover {
  background: var(--accent-light);
}
.btn-gradient {
  background: linear-gradient(135deg, var(--accent), #3b82f6);
  border: none;
}
.btn-gradient:hover {
  opacity: 0.9;
}
.btn-shadow {
  background: var(--accent);
  box-shadow: 0 4px 14px rgba(var(--accent-rgb), 0.4);
}
.btn-shadow:hover {
  box-shadow: 0 6px 20px rgba(var(--accent-rgb), 0.5);
  transform: translateY(-1px);
}
[data-theme="dark"] .layui-btn-primary {
  border-color: var(--border);
  color: var(--text-secondary);
}
[data-theme="dark"] .layui-btn-primary:hover {
  border-color: var(--accent);
  color: var(--accent);
}
[data-theme="dark"] .layui-btn-disabled,
[data-theme="dark"] .layui-btn-disabled:hover {
  background: var(--bg-content);
  color: var(--text-muted);
  border-color: var(--border);
}
</style>

<script>
layui.use(['layer'], function() {
  var layer = layui.layer;
  var $ = layui.$;

  $('.layui-btn').not('.layui-btn-disabled').on('click', function() {
    var text = $(this).text().trim();
    if (text) {
      layer.msg('点击了：' + text, { icon: 1, time: 1000 });
    }
  });
});
</script>
</body>
</html>
