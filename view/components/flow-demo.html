<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流加载组件 - Layui</title>
  <meta name="keywords" content="流加载,flow,滚动加载">
  <meta name="description" content="Layui流加载组件使用示例">
</head>
<body>
  <div class="page-content">
    <div class="layui-card">
      <div class="layui-card-header">
        <h3>流加载组件 (flow)</h3>
      </div>
      <div class="layui-card-body">
        
        <fieldset class="layui-elem-field layui-field-title">
          <legend>信息流</legend>
          <div class="layui-field-box">
            <ul class="flow-default" id="LAY_demo1"></ul>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>图片懒加载</legend>
          <div class="layui-field-box">
            <div class="site-demo-flow" id="LAY_demo2">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/000.jpg" alt="图片1">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/001.jpg" alt="图片2">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/002.jpg" alt="图片3">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/003.jpg" alt="图片4">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/004.jpg" alt="图片5">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/005.jpg" alt="图片6">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/006.jpg" alt="图片7">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/007.jpg" alt="图片8">
              <img lay-src="https://unpkg.com/outeres@0.1.1/demo/008.jpg" alt="图片9">
            </div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>滚动容器</legend>
          <div class="layui-field-box">
            <div class="flow-scroll-box" id="scrollContainer">
              <ul class="flow-default" id="LAY_demo3"></ul>
            </div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>手动加载</legend>
          <div class="layui-field-box">
            <ul class="flow-default" id="LAY_demo4"></ul>
            <div style="text-align: center; margin-top: 10px;">
              <button class="layui-btn" id="loadMore">加载更多</button>
            </div>
          </div>
        </fieldset>

        <fieldset class="layui-elem-field layui-field-title">
          <legend>加载状态</legend>
          <div class="layui-field-box">
            <ul class="flow-default" id="LAY_demo5"></ul>
          </div>
        </fieldset>

      </div>
    </div>
  </div>

  <script>
  layui.use(['flow', 'layer', 'jquery'], function(){
    var flow = layui.flow;
    var layer = layui.layer;
    var $ = layui.$;
    
    flow.load({
      elem: '#LAY_demo1',
      done: function(page, next){
        var lis = [];
        setTimeout(function(){
          for(var i = 0; i < 8; i++){
            lis.push('<li>'+ (page * 8 + i + 1) +'. 这是一条测试数据，当前是第 '+ page +' 页</li>');
          }
          next(lis.join(''), page < 3);
        }, 500);
      }
    });
    
    flow.lazyimg({
      elem: '#LAY_demo2 img'
    });

    flow.load({
      elem: '#LAY_demo3',
      scrollElem: '#scrollContainer',
      done: function(page, next){
        var lis = [];
        setTimeout(function(){
          for(var i = 0; i < 5; i++){
            lis.push('<li>滚动容器内数据 '+ (page * 5 + i + 1) +'</li>');
          }
          next(lis.join(''), page < 5);
        }, 300);
      }
    });

    var page = 0;
    flow.load({
      elem: '#LAY_demo4',
      isAuto: false,
      done: function(nextPage, next){
        page++;
        var lis = [];
        for(var i = 0; i < 5; i++){
          lis.push('<li>手动加载的数据 '+ (page * 5 + i + 1) +'</li>');
        }
        next(lis.join(''), page < 5);
      }
    });

    $('#loadMore').on('click', function(){
      $('#LAY_demo4').trigger('scroll');
    });

    flow.load({
      elem: '#LAY_demo5',
      mb: 100,
      done: function(page, next){
        var lis = [];
        setTimeout(function(){
          for(var i = 0; i < 8; i++){
            lis.push('<li>加载状态示例 '+ (page * 8 + i + 1) +'</li>');
          }
          next(lis.join(''), page < 3);
        }, 800);
      }
    });
  });
  </script>

  <style>
  .flow-default {
    height: 300px;
    overflow: auto;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .flow-default li {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    line-height: 24px;
  }
  .flow-default li:last-child {
    border-bottom: none;
  }
  .site-demo-flow img {
    width: 200px;
    height: 150px;
    margin: 0 10px 10px 0;
    border: none;
    border-radius: 4px;
  }
  .flow-scroll-box {
    height: 200px;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .flow-scroll-box .flow-default {
    height: auto;
    border: none;
    border-radius: 0;
  }
  [data-theme="dark"] .flow-default li {
    border-bottom-color: var(--border);
  }
  </style>
</body>
</html>
