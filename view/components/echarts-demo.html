<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ECharts图表</title>
</head>
<body>
<div class="page-content">
  <div class="demo-header">
    <h3 class="demo-title">ECharts 图表示例</h3>
    <p class="demo-desc">本页面演示 ECharts 图表组件的使用方法，支持主题切换自动适配</p>
  </div>

  <div class="charts-grid">
    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">折线图</span>
        <div class="layui-card-actions">
          <button class="layui-card-btn active" data-type="week">周</button>
          <button class="layui-card-btn" data-type="month">月</button>
        </div>
      </div>
      <div class="layui-card-body">
        <div id="lineChart" class="chart-container"></div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">柱状图</span>
      </div>
      <div class="layui-card-body">
        <div id="barChart" class="chart-container"></div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">饼图</span>
      </div>
      <div class="layui-card-body">
        <div id="pieChart" class="chart-container"></div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">雷达图</span>
      </div>
      <div class="layui-card-body">
        <div id="radarChart" class="chart-container"></div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">面积图</span>
      </div>
      <div class="layui-card-body">
        <div id="areaChart" class="chart-container"></div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">仪表盘</span>
      </div>
      <div class="layui-card-body">
        <div id="gaugeChart" class="chart-container"></div>
      </div>
    </div>
  </div>
</div>

<style>
.demo-header {
  margin-bottom: 16px;
}
.demo-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.demo-desc {
  font-size: 13px;
  color: var(--text-muted);
}
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.chart-container {
  width: 100%;
  height: 300px;
}
@media (max-width: 992px) {
  .charts-grid {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
layui.use(['echartsMod'], function() {
  var echarts = layui.echartsMod;
  var $ = layui.$;
  var charts = [];
  var currentTheme = $('html').attr('data-theme') === 'dark' ? 'dark' : 'light';

  function getChartTheme() {
    return {
      backgroundColor: 'transparent',
      textColor: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#6b7280',
      axisLineColor: getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#e5e7eb',
      splitLineColor: getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#e5e7eb'
    };
  }

  function getAccentColor() {
    return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#16baaa';
  }

  var theme = getChartTheme();
  var accentColor = getAccentColor();

  var lineChart = echarts.init(document.getElementById('lineChart'));
  var barChart = echarts.init(document.getElementById('barChart'));
  var pieChart = echarts.init(document.getElementById('pieChart'));
  var radarChart = echarts.init(document.getElementById('radarChart'));
  var areaChart = echarts.init(document.getElementById('areaChart'));
  var gaugeChart = echarts.init(document.getElementById('gaugeChart'));

  charts = [lineChart, barChart, pieChart, radarChart, areaChart, gaugeChart];

  lineChart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
    xAxis: {
      type: 'category',
      boundaryGap: false,
      data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      axisLabel: { color: theme.textColor }
    },
    yAxis: {
      type: 'value',
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      axisLabel: { color: theme.textColor },
      splitLine: { lineStyle: { color: theme.splitLineColor } }
    },
    series: [{
      data: [820, 932, 901, 934, 1290, 1330, 1320],
      type: 'line',
      smooth: true,
      itemStyle: { color: accentColor },
      areaStyle: { color: accentColor, opacity: 0.1 }
    }]
  });

  barChart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
    xAxis: {
      type: 'category',
      data: ['产品A', '产品B', '产品C', '产品D', '产品E'],
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      axisLabel: { color: theme.textColor }
    },
    yAxis: {
      type: 'value',
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      axisLabel: { color: theme.textColor },
      splitLine: { lineStyle: { color: theme.splitLineColor } }
    },
    series: [{
      data: [120, 200, 150, 80, 70],
      type: 'bar',
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: accentColor },
          { offset: 1, color: accentColor + '66' }
        ])
      }
    }]
  });

  pieChart.setOption({
    tooltip: { trigger: 'item' },
    legend: {
      orient: 'vertical',
      right: '5%',
      top: 'center',
      textStyle: { color: theme.textColor }
    },
    series: [{
      type: 'pie',
      radius: ['40%', '70%'],
      center: ['40%', '50%'],
      avoidLabelOverlap: false,
      itemStyle: { borderRadius: 10, borderColor: 'transparent' },
      label: { show: false },
      emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
      data: [
        { value: 1048, name: '搜索引擎', itemStyle: { color: accentColor } },
        { value: 735, name: '直接访问', itemStyle: { color: '#3b82f6' } },
        { value: 580, name: '邮件营销', itemStyle: { color: '#f59e0b' } },
        { value: 484, name: '联盟广告', itemStyle: { color: '#8b5cf6' } }
      ]
    }]
  });

  radarChart.setOption({
    tooltip: {},
    radar: {
      indicator: [
        { name: '销售', max: 6500 },
        { name: '管理', max: 16000 },
        { name: '技术', max: 30000 },
        { name: '客服', max: 38000 },
        { name: '研发', max: 52000 },
        { name: '市场', max: 25000 }
      ],
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      splitLine: { lineStyle: { color: theme.splitLineColor } },
      splitArea: { areaStyle: { color: 'transparent' } },
      axisName: { color: theme.textColor }
    },
    series: [{
      type: 'radar',
      data: [{
        value: [4200, 3000, 20000, 35000, 50000, 18000],
        name: '预算分配',
        areaStyle: { color: accentColor, opacity: 0.2 },
        lineStyle: { color: accentColor },
        itemStyle: { color: accentColor }
      }]
    }]
  });

  areaChart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
    xAxis: {
      type: 'category',
      boundaryGap: false,
      data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月'],
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      axisLabel: { color: theme.textColor }
    },
    yAxis: {
      type: 'value',
      axisLine: { lineStyle: { color: theme.axisLineColor } },
      axisLabel: { color: theme.textColor },
      splitLine: { lineStyle: { color: theme.splitLineColor } }
    },
    series: [{
      data: [820, 932, 901, 934, 1290, 1330, 1320],
      type: 'line',
      smooth: true,
      itemStyle: { color: accentColor },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: accentColor + 'cc' },
          { offset: 1, color: accentColor + '11' }
        ])
      }
    }]
  });

  gaugeChart.setOption({
    series: [{
      type: 'gauge',
      center: ['50%', '60%'],
      startAngle: 200,
      endAngle: -20,
      min: 0,
      max: 100,
      splitNumber: 10,
      axisLine: {
        lineStyle: {
          width: 20,
          color: [
            [0.3, '#f59e0b'],
            [0.7, '#3b82f6'],
            [1, accentColor]
          ]
        }
      },
      pointer: {
        itemStyle: { color: 'auto' }
      },
      axisTick: { distance: -20, length: 8, lineStyle: { color: 'auto', width: 2 } },
      splitLine: { distance: -20, length: 20, lineStyle: { color: 'auto', width: 3 } },
      axisLabel: { color: theme.textColor, distance: 30, fontSize: 12 },
      detail: { valueAnimation: true, formatter: '{value}%', color: theme.textColor, fontSize: 20 },
      data: [{ value: 75 }]
    }]
  });

  window.addEventListener('resize', function() {
    charts.forEach(function(chart) {
      chart.resize();
    });
  });

  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      if (mutation.attributeName === 'data-theme') {
        var newTheme = $('html').attr('data-theme') === 'dark' ? 'dark' : 'light';
        if (newTheme !== currentTheme) {
          currentTheme = newTheme;
          location.reload();
        }
      }
    });
  });
  observer.observe(document.documentElement, { attributes: true });

  $('.layui-card-btn').on('click', function() {
    $(this).addClass('active').siblings().removeClass('active');
  });
});
</script>
</body>
</html>
