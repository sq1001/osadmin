<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>抽屉弹窗</title>
</head>
<body>
<div class="page-content">
  <div class="demo-header">
    <h3 class="demo-title">Drawer 抽屉弹窗</h3>
    <p class="demo-desc">Layui 2.8+ 支持抽屉效果，通过 offset 和 anim 属性实现从页面边缘滑出</p>
  </div>

  <div class="layui-card highlight-card">
    <div class="layui-card-header">
      <span class="layui-card-title">内容区域抽屉</span>
      <span class="layui-badge layui-bg-green" style="margin-left: 8px;">推荐</span>
    </div>
    <div class="layui-card-body">
      <p class="card-desc">通过自定义样式将抽屉限制在内容区域内，不会覆盖侧边栏和顶栏。</p>
      <div class="btn-group" style="margin-top: 12px;">
        <button class="layui-btn layui-btn-normal" id="contentDrawerRight">右侧抽屉</button>
        <button class="layui-btn" id="contentDrawerLeft">左侧抽屉</button>
        <button class="layui-btn layui-btn-warm" id="contentDrawerTop">顶部抽屉</button>
        <button class="layui-btn layui-btn-danger" id="contentDrawerBottom">底部抽屉</button>
      </div>
    </div>
  </div>

  <div class="demo-grid">
    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">基础抽屉</span>
      </div>
      <div class="layui-card-body">
        <div class="btn-group">
          <button class="layui-btn" id="drawerTop">从上往下</button>
          <button class="layui-btn layui-btn-normal" id="drawerRight">从右往左</button>
          <button class="layui-btn layui-btn-warm" id="drawerBottom">从下往上</button>
          <button class="layui-btn layui-btn-danger" id="drawerLeft">从左往右</button>
        </div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">带表单抽屉</span>
      </div>
      <div class="layui-card-body">
        <button class="layui-btn" id="drawerForm">
          <i class="layui-icon layui-icon-edit"></i> 编辑表单抽屉
        </button>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">详情抽屉</span>
      </div>
      <div class="layui-card-body">
        <button class="layui-btn layui-btn-normal" id="drawerDetail">
          <i class="layui-icon layui-icon-about"></i> 查看详情抽屉
        </button>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">多层抽屉</span>
      </div>
      <div class="layui-card-body">
        <button class="layui-btn layui-btn-warm" id="drawerMulti">
          <i class="layui-icon layui-icon-layer"></i> 打开多层抽屉
        </button>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">自定义尺寸</span>
      </div>
      <div class="layui-card-body">
        <div class="btn-group">
          <button class="layui-btn" id="drawerSmall">小尺寸 (300px)</button>
          <button class="layui-btn layui-btn-normal" id="drawerMedium">中尺寸 (450px)</button>
          <button class="layui-btn layui-btn-warm" id="drawerLarge">大尺寸 (600px)</button>
        </div>
      </div>
    </div>

    <div class="layui-card">
      <div class="layui-card-header">
        <span class="layui-card-title">无遮罩抽屉</span>
      </div>
      <div class="layui-card-body">
        <button class="layui-btn layui-btn-primary" id="drawerNoShade">
          <i class="layui-icon layui-icon-unlink"></i> 无遮罩抽屉
        </button>
      </div>
    </div>
  </div>
</div>

<style>
.demo-header {
  margin-bottom: 16px;
}
.demo-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.demo-desc {
  font-size: 13px;
  color: var(--text-muted);
}
.demo-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (max-width: 992px) {
  .demo-grid {
    grid-template-columns: 1fr;
  }
}
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.highlight-card {
  margin-bottom: 16px;
  border: 1px solid var(--accent);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.highlight-card .layui-card-header {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), rgba(59, 130, 246, 0.1));
}
.card-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin: 0;
}
.drawer-form {
  padding: 20px;
}
.drawer-form .layui-form-item {
  margin-bottom: 15px;
}
.drawer-form .layui-form-label {
  width: 80px;
}
.drawer-form .layui-input-block {
  margin-left: 110px;
}
.drawer-detail {
  padding: 20px;
}
.drawer-detail-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.drawer-detail-item:last-child {
  border-bottom: none;
}
.drawer-detail-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.drawer-detail-value {
  font-size: 14px;
  color: var(--text-primary);
}
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}
.status-badge.shipped {
  background: rgba(59, 130, 246, 0.1);
  color: #3b82f6;
}
</style>

<script>
layui.use(['layer', 'form'], function() {
  var layer = layui.layer;
  var form = layui.form;
  var $ = layui.$;

  function openContentDrawer(options) {
    var $container = $('#contentWrapper');
    if ($container.css('position') === 'static') {
      $container.css('position', 'relative');
    }
    
    var placement = options.placement || 'right';
    var drawerW = parseInt(options.width) || 400;
    var drawerH = parseInt(options.height) || 300;
    
    var $wrapper = $('<div class="drawer-wrapper"></div>').css({
      position: 'absolute',
      top: 0, left: 0, right: 0, bottom: 0,
      zIndex: options.zIndex || 1000,
      overflow: 'hidden',
      pointerEvents: 'none'
    });
    
    var $shade = $('<div class="drawer-shade"></div>').css({
      position: 'absolute',
      top: 0, left: 0, right: 0, bottom: 0,
      backgroundColor: 'rgba(0,0,0,' + (options.shade !== undefined ? options.shade : 0.3) + ')',
      pointerEvents: 'auto',
      opacity: 0,
      transition: 'opacity 0.3s'
    });
    
    var $drawer = $('<div class="drawer-content"></div>').css({
      position: 'absolute',
      backgroundColor: '#fff',
      boxShadow: '-2px 0 8px rgba(0,0,0,0.15)',
      pointerEvents: 'auto',
      transition: 'transform 0.3s ease'
    });
    
    var title = options.title || '抽屉';
    var $header = $('<div class="drawer-header" style="padding:16px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:16px;font-weight:500;">' + title + '</span><button class="drawer-close" style="background:none;border:none;cursor:pointer;font-size:16px;">&times;</button></div>');
    var $body = $('<div class="drawer-body" style="padding:24px;overflow:auto;"></div>').html(options.content || '');
    
    $drawer.append($header).append($body);
    $wrapper.append($shade).append($drawer);
    $container.append($wrapper);
    
    var transformInit, transformTarget;
    switch (placement) {
      case 'right':
        $drawer.css({ top: 0, right: 0, bottom: 0, width: drawerW });
        transformInit = 'translateX(100%)';
        transformTarget = 'translateX(0)';
        break;
      case 'left':
        $drawer.css({ top: 0, left: 0, bottom: 0, width: drawerW });
        transformInit = 'translateX(-100%)';
        transformTarget = 'translateX(0)';
        break;
      case 'top':
        $drawer.css({ top: 0, left: 0, right: 0, height: drawerH });
        transformInit = 'translateY(-100%)';
        transformTarget = 'translateY(0)';
        break;
      case 'bottom':
        $drawer.css({ bottom: 0, left: 0, right: 0, height: drawerH });
        transformInit = 'translateY(100%)';
        transformTarget = 'translateY(0)';
        break;
    }
    
    $drawer.css('transform', transformInit);
    
    requestAnimationFrame(function() {
      $shade.css('opacity', 1);
      $drawer.css('transform', transformTarget);
    });
    
    function close() {
      $shade.css('opacity', 0);
      $drawer.css('transform', transformInit);
      setTimeout(function() {
        $wrapper.remove();
        if (options.onClose) options.onClose();
      }, 300);
    }
    
    $shade.on('click', function() {
      if (options.shadeClose !== false) close();
    });
    
    $header.find('.drawer-close').on('click', close);
    
    return { close: close, $wrapper: $wrapper, $drawer: $drawer };
  }

  $('#contentDrawerRight').on('click', function() {
    openContentDrawer({
      title: '右侧内容抽屉',
      placement: 'right',
      width: '400px',
      content: '<div style="padding: 20px;"><p>这是一个限制在内容区域的右侧抽屉。</p><p style="margin-top: 12px; color: var(--text-muted);">不会覆盖侧边栏和顶栏。</p></div>'
    });
  });

  $('#contentDrawerLeft').on('click', function() {
    openContentDrawer({
      title: '左侧内容抽屉',
      placement: 'left',
      width: '350px',
      content: '<div style="padding: 20px;"><p>这是一个限制在内容区域的左侧抽屉。</p><p style="margin-top: 12px; color: var(--text-muted);">适合用于筛选面板或导航菜单。</p></div>'
    });
  });

  $('#contentDrawerTop').on('click', function() {
    openContentDrawer({
      title: '顶部内容抽屉',
      placement: 'top',
      height: '200px',
      content: '<div style="padding: 20px;"><p>这是一个限制在内容区域的顶部抽屉。</p><p style="margin-top: 12px; color: var(--text-muted);">适合用于高级搜索或筛选条件。</p></div>'
    });
  });

  $('#contentDrawerBottom').on('click', function() {
    openContentDrawer({
      title: '底部内容抽屉',
      placement: 'bottom',
      height: '250px',
      content: '<div style="padding: 20px;"><p>这是一个限制在内容区域的底部抽屉。</p><p style="margin-top: 12px; color: var(--text-muted);">适合用于操作面板或批量操作。</p></div>'
    });
  });

  $('#drawerTop').on('click', function() {
    layer.open({
      type: 1,
      title: '从上往下的抽屉',
      offset: 't',
      anim: 'slideDown',
      area: ['100%', '200px'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个从页面顶部滑出的抽屉面板，点击遮罩区域可关闭。</div>'
    });
  });

  $('#drawerRight').on('click', function() {
    layer.open({
      type: 1,
      title: '从右往左的抽屉',
      offset: 'r',
      anim: 'slideLeft',
      area: ['350px', '100%'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个从页面右侧滑出的抽屉面板，适合用于详情展示或表单编辑。</div>'
    });
  });

  $('#drawerBottom').on('click', function() {
    layer.open({
      type: 1,
      title: '从下往上的抽屉',
      offset: 'b',
      anim: 'slideUp',
      area: ['100%', '250px'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个从页面底部滑出的抽屉面板，常用于操作面板或筛选条件。</div>'
    });
  });

  $('#drawerLeft').on('click', function() {
    layer.open({
      type: 1,
      title: '从左往右的抽屉',
      offset: 'l',
      anim: 'slideRight',
      area: ['350px', '100%'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个从页面左侧滑出的抽屉面板，适合用于导航菜单或筛选面板。</div>'
    });
  });

  $('#drawerForm').on('click', function() {
    layer.open({
      type: 1,
      title: '编辑用户信息',
      offset: 'r',
      anim: 'slideLeft',
      area: ['450px', '100%'],
      shade: 0.3,
      shadeClose: false,
      btn: ['保存', '取消'],
      yes: function(index) {
        layer.msg('保存成功', { icon: 1 });
        layer.close(index);
      },
      content: [
        '<div class="drawer-form">',
          '<div class="layui-form" lay-filter="drawerFormFilter">',
            '<div class="layui-form-item">',
              '<label class="layui-form-label">用户名</label>',
              '<div class="layui-input-block">',
                '<input type="text" name="username" value="张三" class="layui-input">',
              '</div>',
            '</div>',
            '<div class="layui-form-item">',
              '<label class="layui-form-label">邮箱</label>',
              '<div class="layui-input-block">',
                '<input type="email" name="email" value="zhangsan@example.com" class="layui-input">',
              '</div>',
            '</div>',
            '<div class="layui-form-item">',
              '<label class="layui-form-label">手机号</label>',
              '<div class="layui-input-block">',
                '<input type="tel" name="phone" value="13800138000" class="layui-input">',
              '</div>',
            '</div>',
            '<div class="layui-form-item">',
              '<label class="layui-form-label">部门</label>',
              '<div class="layui-input-block">',
                '<select name="department">',
                  '<option value="1">技术部</option>',
                  '<option value="2">销售部</option>',
                  '<option value="3">财务部</option>',
                '</select>',
              '</div>',
            '</div>',
            '<div class="layui-form-item">',
              '<label class="layui-form-label">状态</label>',
              '<div class="layui-input-block">',
                '<input type="checkbox" name="status" lay-skin="switch" lay-text="启用|禁用" checked>',
              '</div>',
            '</div>',
            '<div class="layui-form-item">',
              '<label class="layui-form-label">备注</label>',
              '<div class="layui-input-block">',
                '<textarea name="remark" class="layui-textarea" placeholder="请输入备注"></textarea>',
              '</div>',
            '</div>',
          '</div>',
        '</div>'
      ].join(''),
      success: function(layero) {
        form.render(null, 'drawerFormFilter');
      }
    });
  });

  $('#drawerDetail').on('click', function() {
    layer.open({
      type: 1,
      title: '订单详情 #ORD-2024-001',
      offset: 'r',
      anim: 'slideLeft',
      area: ['500px', '100%'],
      shade: 0.3,
      shadeClose: true,
      content: [
        '<div class="drawer-detail">',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">订单编号</div>',
            '<div class="drawer-detail-value">ORD-2024-001</div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">客户名称</div>',
            '<div class="drawer-detail-value">张三</div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">联系电话</div>',
            '<div class="drawer-detail-value">138-0013-8000</div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">收货地址</div>',
            '<div class="drawer-detail-value">北京市朝阳区xxx街道xxx号</div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">订单金额</div>',
            '<div class="drawer-detail-value" style="color: var(--accent); font-size: 18px; font-weight: 600;">¥ 1,299.00</div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">订单状态</div>',
            '<div class="drawer-detail-value"><span class="status-badge shipped">已发货</span></div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">创建时间</div>',
            '<div class="drawer-detail-value">2024-01-15 14:30:00</div>',
          '</div>',
          '<div class="drawer-detail-item">',
            '<div class="drawer-detail-label">备注</div>',
            '<div class="drawer-detail-value">请在工作日配送，谢谢！</div>',
          '</div>',
        '</div>'
      ].join('')
    });
  });

  var drawerIndex = 1;
  $('#drawerMulti').on('click', function() {
    layer.open({
      type: 1,
      title: '第一层抽屉',
      offset: 'r',
      anim: 'slideLeft',
      area: ['350px', '100%'],
      shade: 0.1,
      shadeClose: true,
      content: [
        '<div style="padding: 20px;">',
          '<p>这是第一层抽屉</p>',
          '<button class="layui-btn layui-btn-normal" id="openSecondDrawer" style="margin-top: 20px;">打开第二层抽屉</button>',
        '</div>'
      ].join(''),
      success: function() {
        $('#openSecondDrawer').on('click', function() {
          layer.open({
            type: 1,
            title: '第二层抽屉',
            offset: 'r',
            anim: 'slideLeft',
            area: ['300px', '100%'],
            shade: 0.05,
            shadeClose: true,
            content: '<div style="padding: 20px;"><p>这是第二层抽屉</p><p style="margin-top: 10px; color: var(--text-muted); font-size: 12px;">多层抽屉可以用于复杂的信息层级展示</p></div>'
          });
        });
      }
    });
  });

  $('#drawerSmall').on('click', function() {
    layer.open({
      type: 1,
      title: '小尺寸抽屉 (300px)',
      offset: 'r',
      anim: 'slideLeft',
      area: ['300px', '100%'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个宽度为 300px 的小尺寸抽屉</div>'
    });
  });

  $('#drawerMedium').on('click', function() {
    layer.open({
      type: 1,
      title: '中尺寸抽屉 (450px)',
      offset: 'r',
      anim: 'slideLeft',
      area: ['450px', '100%'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个宽度为 450px 的中等尺寸抽屉</div>'
    });
  });

  $('#drawerLarge').on('click', function() {
    layer.open({
      type: 1,
      title: '大尺寸抽屉 (600px)',
      offset: 'r',
      anim: 'slideLeft',
      area: ['600px', '100%'],
      shade: 0.1,
      shadeClose: true,
      content: '<div style="padding: 20px;">这是一个宽度为 600px 的大尺寸抽屉，适合展示更多内容</div>'
    });
  });

  $('#drawerNoShade').on('click', function() {
    layer.open({
      type: 1,
      title: '无遮罩抽屉',
      offset: 'r',
      anim: 'slideLeft',
      area: ['350px', '100%'],
      shade: 0,
      closeBtn: 1,
      content: '<div style="padding: 20px;"><p>这是一个没有遮罩的抽屉</p><p style="margin-top: 10px; color: var(--text-muted); font-size: 12px;">你可以继续操作页面其他内容</p></div>'
    });
  });
});
</script>
</body>
</html>
